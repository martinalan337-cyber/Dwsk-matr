<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy AI - Your Voice Assistant Friend</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-hover: #5b4bc4;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --chat-bg: rgba(255, 255, 255, 0.9);
            --user-bubble: #6c5ce7;
            --ai-bubble: #ffffff;
            --text-dark: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--chat-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 451px) {
            .app-container {
                height: 85vh;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
        }

        .app-header {
            padding: 16px;
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .status-indicator {
            font-size: 0.8rem;
            color: #636e72;
            margin-top: 4px;
        }

        .chat-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            display: flex;
            width: 100%;
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        .msg-bubble {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.98rem;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            word-wrap: break-word;
        }

        .user-message .msg-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-message .msg-bubble {
            background: var(--ai-bubble);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .preview-panel {
            padding: 12px;
            background: rgba(0, 0, 0, 0.04);
            position: relative;
            text-align: center;
        }

        .preview-panel img {
            max-height: 100px;
            max-width: 100%;
            border-radius: 8px;
            border: 2px solid white;
        }

        .close-preview {
            position: absolute;
            top: 2px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
            color: #000;
        }

        .input-panel {
            padding: 14px 16px;
            background: white;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #text-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid #dfe6e9;
            outline: none;
            font-size: 1rem;
        }

        #text-input:focus {
            border-color: var(--primary);
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.15rem;
            transition: background 0.2s;
            background: #f1f2f6;
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .upload-btn { background: #ffeaa7; }
        .mic-btn { background: #81ecec; }
        .mic-btn.recording {
            background: #ff7675;
            color: white;
            animation: pulse 1.4s infinite;
        }
        .send-btn { background: var(--primary); color: white; }

        .api-container { width: 100%; }
        #api-key-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px dashed #b2bec3;
            font-size: 0.85rem;
            outline: none;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">✨ StudyBuddy AI</div>
            <div class="status-indicator" id="status">Ready to learn!</div>
        </header>
        
        <main class="chat-area" id="chat-box">
            <div class="message ai-message">
                <div class="msg-bubble">
                    Hi there! I'm your StudyBuddy AI assistant. 📚 I'm here like a friend to help you with your homework, doubts, and studies. You can type, use your microphone to speak to me, or upload a picture of a problem!
                </div>
            </div>
        </main>

        <div class="preview-panel" id="preview-container" style="display: none;">
            <span class="close-preview" id="close-preview-btn">&times;</span>
            <img id="image-preview" src="" alt="Selected homework image">
        </div>

        <footer class="input-panel">
            <div class="controls-row">
                <label for="file-upload" class="action-btn upload-btn">🖼️</label>
                <input type="file" id="file-upload" accept="image/*" style="display: none;">
                
                <button class="action-btn mic-btn" id="mic-btn">🎙️</button>
                <input type="text" id="text-input" placeholder="Ask your friend anything...">
                <button class="action-btn send-btn" id="send-btn">➔</button>
            </div>
            <div class="api-container">
                <input type="password" id="api-key-input" placeholder="🔑 Paste your free Gemini API Key here...">
            </div>
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const fileUpload = document.getElementById('file-upload');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const closePreviewBtn = document.getElementById('close-preview-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const statusIndicator = document.getElementById('status');

        let base64Image = null;
        let mimeType = '';

        if (localStorage.getItem('studybuddy_api_key')) {
            apiKeyInput.value = localStorage.getItem('studybuddy_api_key');
        }

        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('studybuddy_api_key', apiKeyInput.value.trim());
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                micBtn.classList.add('recording');
                statusIndicator.innerText = 'Listening closely... 🎙️';
            };

            recognition.onerror = () => {
                statusIndicator.innerText = 'Oops! Try speaking again.';
                micBtn.classList.remove('recording');
            };

            recognition.onend = () => {
                micBtn.classList.remove('recording');
                statusIndicator.innerText = 'Ready to learn!';
            };

            recognition.onresult = (event) => {
                textInput.value = event.results[0][0].transcript;
                sendMessage();
            };

            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('recording')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        } else {
            micBtn.style.display = 'none';
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const clearText = text.replace(/[*#`_\-]/g, '');
                const utterance = new SpeechSynthesisUtterance(clearText);
                window.speechSynthesis.speak(utterance);
            }
        }

        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                mimeType = file.type;
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    previewContainer.style.display = 'block';
                    base64Image = event.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        closePreviewBtn.addEventListener('click', () => {
            base64Image = null;
            fileUpload.value = '';
            previewContainer.style.display = 'none';
        });

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', isUser ? 'user-message' : 'ai-message');
            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.innerText = text;
            msgDiv.appendChild(bubble);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const prompt = textInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!prompt && !base64Image) return;
            if (!apiKey) {
                alert("Please paste your free Gemini API Key at the bottom first!");
                return;
            }

            if (prompt) appendMessage(prompt, true);
            else if (base64Image) appendMessage("[Sent an image]", true);

            textInput.value = '';
            previewContainer.style.display = 'none';
            statusIndicator.innerText = 'Thinking... 🤔';

            let contents = [{
                parts: [{ text: "You are a friendly, conversational, and highly supportive school study buddy. Help the user with their homework or question cleanly, keeping answers direct and warm so they sound natural when spoken out loud. Here is the question: " + (prompt || "Analyze this image and explain it.") }]
            }];

            if (base64Image) {
                contents[0].parts.push({
                    inlineData: { mimeType: mimeType || "image/jpeg", data: base64Image }
                });
            }

            base64Image = null;
            fileUpload.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const reply = data.candidates[0].content.parts[0].text;
                    appendMessage(reply, false);
                    speak(reply);
                } else {
                    throw new Error("Invalid format");
                }
            } catch (err) {
                appendMessage("Ah, I had a little trouble connecting. Please check your internet or API key!", false);
            } finally {
                statusIndicator.innerText = 'Ready to learn!';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        textInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
